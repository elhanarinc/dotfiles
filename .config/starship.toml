"$schema" = 'https://starship.rs/config-schema.json'

# Add a blank line before the prompt
add_newline = true

# Prompt format — order of modules
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$golang\
$nodejs\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

# =============================================================
# Username — only show when SSH'd in
# =============================================================
[username]
show_always = false
format = "[$user]($style) "
style_user = "bold green"
style_root = "bold red"

# =============================================================
# Hostname — only show when SSH'd in
# =============================================================
[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold yellow"

# =============================================================
# Directory
# =============================================================
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " 󰌾"

# =============================================================
# Git
# =============================================================
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "!"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# =============================================================
# Languages — auto-detected from project files
# =============================================================
[python]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold yellow"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]

[golang]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold cyan"
detect_files = ["go.mod", "go.sum", "go.work"]

[nodejs]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold green"
detect_files = ["package.json"]
not_capable_style = "bold red"

[rust]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold orange"

# =============================================================
# Kubernetes — enabled (show active context)
# =============================================================
[kubernetes]
disabled = false
format = "[$symbol$context( \\($namespace\\))]($style) "
style = "bold cyan"
symbol = "⎈ "

# =============================================================
# Command duration — show if command took > 2 seconds
# =============================================================
[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

# =============================================================
# Prompt character
# =============================================================
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
