# =============================================================
# Prefix key — C-a (screen-style, more ergonomic than C-b)
# =============================================================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# =============================================================
# Terminal & colors
# =============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-ghostty:RGB"    # Ghostty true color

# =============================================================
# General settings
# =============================================================
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -sg escape-time 0          # No delay for Escape key (critical for vim)
set -g focus-events on
set -g set-clipboard on
set -g mouse on

# Start windows and panes from 1 (easier to reach than 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on     # Auto-renumber on close

# =============================================================
# Key bindings
# =============================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes — keep current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n next-window
bind -r p previous-window

# =============================================================
# Copy mode (vi-style)
# =============================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# macOS clipboard integration
if-shell "uname | grep -q Darwin" {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
}

# =============================================================
# Status bar
# =============================================================
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour235,fg=colour137"

set -g status-left-length 30
set -g status-right-length 60

set -g status-left "#[fg=colour233,bg=colour241,bold] #S #[fg=colour241,bg=colour235] "
set -g status-right "#[fg=colour241,bg=colour235]#[fg=colour233,bg=colour241] %d/%m  %H:%M #[fg=colour245,bg=colour241]#[fg=colour233,bg=colour245,bold] #h "

setw -g window-status-current-style "fg=colour81,bg=colour238,bold"
setw -g window-status-current-format " #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour81]#F "

setw -g window-status-style "fg=colour138,bg=colour235"
setw -g window-status-format " #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F "

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour81"

# Message styling
set -g message-style "fg=colour232,bg=colour166,bold"
